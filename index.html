<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeusEstudos.com</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dark-mode">
    <header id="main-header">
        <div class="header-left">
            <div class="mac-window-controls">
                <span class="mac-dot mac-red"></span>
                <span class="mac-dot mac-yellow"></span>
                <span class="mac-dot mac-green" id="mac-fullscreen-btn" title="Tela Cheia"></span>
            </div>
            <div class="logo">MeusEstudos.com</div>
        </div>
        
        <nav class="header-center">
            <button class="nav-btn active" data-target="dashboard">Visão Geral</button>
            <button class="nav-btn" data-target="timer">Cronômetro</button>
            <button class="nav-btn" data-target="tasks">Matérias</button>
        </nav>

        <div class="header-right">
            <button id="theme-toggle" title="Alternar Tema">Tema</button>
        </div>
    </header>

    <main>
        <section id="dashboard" class="view active">
            <div class="container dashboard-grid">
                
                <div class="main-panel">
                    <div class="progress-card">
                        <div class="progress-header">
                            <h3>Progresso Diário (Meta: 4h)</h3>
                            <span id="daily-percentage">0%</span>
                        </div>
                        <div class="progress-bar-bg">
                            <div class="progress-bar-fill" id="daily-progress-fill"></div>
                        </div>
                    </div>

                    <div class="chart-wrapper">
                        <div class="panel-header">
                            <h2>Histórico de Estudos (Últimos 7 dias)</h2>
                            <div class="total-badge">
                                <span class="label">TOTAL ACUMULADO</span>
                                <span id="total-accumulated">0h 0m</span>
                            </div>
                        </div>
                        <div class="chart-container">
                            <canvas id="weeklyChart"></canvas>
                        </div>
                    </div>

                    <div class="heatmap-card">
                        <h2>Consistência (Últimos 30 dias)</h2>
                        <div class="heatmap-grid" id="heatmap-grid"></div>
                        <div class="heatmap-legend">
                            <span>Menos</span>
                            <div class="legend-cell level-0"></div>
                            <div class="legend-cell level-1"></div>
                            <div class="legend-cell level-2"></div>
                            <div class="legend-cell level-3"></div>
                            <span>Mais</span>
                        </div>
                    </div>
                </div>

                <div class="side-panel">
                    <div class="stat-card streak-card">
                        <div class="stat-info">
                            <h3>Ofensiva</h3>
                            <p><span id="streak-display">0</span> dias</p>
                        </div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-info">
                            <h3>Recorde Diário</h3>
                            <p id="record-day-display">00:00</p>
                        </div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-info">
                            <h3>Melhor Semana</h3>
                            <p id="record-week-display">00:00</p>
                        </div>
                    </div>

                    <div class="stat-card outline">
                        <div class="stat-info">
                            <h3>Estudo Hoje</h3>
                            <p id="total-time-display" class="highlight">00:00:00</p>
                            <span class="sub-text" id="sessions-display">0 sessões hoje</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="timer" class="view">
            <div class="container timer-container">
                
                <div class="stopwatch">
                    <h1 id="time-display">
                        <span id="time-main">00:00:00</span><span id="time-ms">.00</span>
                    </h1>
                </div>
                
                <div class="controls">
                    <button id="btn-toggle" class="icon-btn" title="Iniciar/Pausar (Espaço)">
                        <svg id="icon-play" viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
                        <svg id="icon-pause" viewBox="0 0 24 24" width="24" height="24" style="display: none;"><path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                    </button>
                    <button id="btn-reset" class="icon-btn" title="Zerar (Delete)">
                        <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
                    </button>
                    <button id="focus-toggle" class="icon-btn" title="Modo Foco (Enter)">
                        <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                    </button>
                </div>
            </div>
        </section>

        <section id="tasks" class="view">
            <div class="container container-small">
                <h2>Disciplinas do Edital</h2>
                <ul class="task-list" id="task-list"></ul>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
